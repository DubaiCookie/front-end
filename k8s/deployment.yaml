apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: frontend
          image: amdp-registry.skala-ai.com/skala26a-cloud/team3-frontend:8656e9ddb8ff3aa3ee0d4a16638bc7d21bef5dee
          ports:
            - containerPort: 3001
